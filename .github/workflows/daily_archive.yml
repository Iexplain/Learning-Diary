name: Daily Learning Archive

on:
  schedule:
    # UTC 时间 15:59 对应北京/新加坡时间 23:59
    - cron: '59 15 * * *'
  workflow_dispatch: # 允许你手动点击运行测试

permissions:
  contents: write  # 允许 Action 提交代码

jobs:
  generate-archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Archive Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GitHub 自动提供的 Token
        run: python scripts/archive.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add archives/
          # 如果今天没有新文件生成，忽略 commit 报错
          git commit -m "Auto-archive for $(date +'%Y-%m-%d')" || exit 0
          git push
